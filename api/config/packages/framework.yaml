framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false

    # Sesiones (si las usas)
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax

    # Errores PHP
    php_errors:
        log: true

    # PropertyInfo — Symfony 6.4 solo permite "enabled"
    property_info:
        enabled: true

    # PropertyAccess
    property_access:
        enabled: true

    # Serializer
    serializer:
        enabled: true

    # Validation
    validation:
        enabled: true
        enable_annotations: true

    # Router
    router:
        utf8: true

    # Cache
    cache:
        app: cache.adapter.filesystem
        system: cache.adapter.system
